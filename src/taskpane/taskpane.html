<!DOCTYPE html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Khmer Luna Date</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css" />
  </head>
  <body>
    <header class="header">
      <h1>ថ្ងៃចន្ទគតិខ្មែរ</h1>
      <p class="subtitle">Khmer Luna Date for Office</p>
    </header>

    <main>
      <section class="card">
        <h2>ជ្រើសរើសថ្ងៃ</h2>
        <label for="gregorian-date">ថ្ងៃសុរិយគតិ (Gregorian)</label>
        <input id="gregorian-date" type="date" />
        <button id="today-btn" type="button" class="secondary">ប្រើថ្ងៃនេះ</button>
        <button id="read-selection-btn" type="button" class="secondary">អានពី cell ដែលជ្រើស</button>
      </section>

      <section class="card">
        <h2>ពាក្យដើម (Option 2 &amp; 3)</h2>
        <label for="custom-label">ផ្លូវមាស ឬពាក្យផ្សេង (អាចប្តូរបាន)</label>
        <input id="custom-label" type="text" value="ផ្លូវមាស" maxlength="80" />
        <p class="hint">ឧ. ផ្លូវមាស, ការិយាល័យ, រដ្ឋបាល...</p>
      </section>

      <section class="card">
        <h2>រូបរាង (Format)</h2>
        <fieldset class="format-options">
          <legend class="sr-only">Choose output format</legend>
          <label class="format-option">
            <input type="radio" name="format" value="1" checked />
            <span class="format-title">Option 1 — ចន្ទគតិ</span>
            <span class="format-sample">ថ្ងៃចន្ទ ១២ រោច ខែបុស្ស ឆ្នាំម្សាញ់ សប្តស័ក ព.ស.២៥៧០</span>
          </label>
          <label class="format-option">
            <input type="radio" name="format" value="2" />
            <span class="format-title">Option 2 — ពាក្យដើម + សុរិយគតិ</span>
            <span class="format-sample">ផ្លូវមាស ថ្ងៃទី១២ ខែមករា ឆ្នាំ២០២៦</span>
          </label>
          <label class="format-option">
            <input type="radio" name="format" value="3" />
            <span class="format-title">Option 3 — ទាំងពីរ (២ជួរ)</span>
            <span class="format-sample">ចន្ទគតិ + ផ្លូវមាស សុរិយគតិ</span>
          </label>
          <label class="format-option">
            <input type="radio" name="format" value="4" />
            <span class="format-title">Option 4 — សុរិយគតិ</span>
            <span class="format-sample">ថ្ងៃទី១២ ខែមករា ឆ្នាំ២០២៦</span>
          </label>
        </fieldset>
      </section>

      <section class="card preview-card">
        <h2>លទ្ធផល</h2>
        <pre id="preview" class="preview"></pre>
      </section>

      <section class="actions">
        <button id="insert-btn" type="button" class="primary">បញ្ចូល (Insert)</button>
        <button id="copy-btn" type="button" class="secondary">Copy</button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="../lib/momentkh.js"></script>
    <script src="taskpane.js"></script>
  </body>
</html>
