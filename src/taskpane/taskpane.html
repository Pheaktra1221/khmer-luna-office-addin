<!DOCTYPE html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Khmer Luna Date</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css" />
  </head>
  <body>
    <header class="header">
      <h1>ថ្ងៃចន្ទគតិខ្មែរ</h1>
    </header>

    <main>
      <!-- Calendar -->
      <div class="cal-card">
        <div class="cal-nav">
          <button id="prev-month" class="nav-btn" aria-label="ខែមុន">&#8249;</button>
          <span id="cal-month-label" class="cal-month-label"></span>
          <button id="next-month" class="nav-btn" aria-label="ខែបន្ទាប់">&#8250;</button>
        </div>
        <div class="cal-weekdays">
          <span>អា</span><span>ច</span><span>អ</span><span>ព</span>
          <span>ព្រ</span><span>សុ</span><span>ស</span>
        </div>
        <div id="cal-grid" class="cal-grid"></div>
      </div>

      <!-- Khmer date result -->
      <div class="result-card">
        <div id="khmer-date-display" class="khmer-date-display">
          <span class="kd-lunar" id="kd-lunar"></span>
          <span class="kd-solar" id="kd-solar"></span>
        </div>
      </div>

      <!-- Format -->
      <div class="format-card">
        <div class="format-row">
          <label class="fmt-label">Format</label>
          <div class="fmt-pills">
            <button class="pill active" data-fmt="1">ចន្ទគតិ</button>
            <button class="pill" data-fmt="2">សុរិយគតិ</button>
            <button class="pill" data-fmt="3">ទាំងពីរ</button>
            <button class="pill" data-fmt="4">ពាក្យដើម</button>
          </div>
        </div>
        <div id="label-row" class="label-row hidden">
          <input id="custom-label" type="text" value="ផ្លូវមាស" maxlength="80" placeholder="ពាក្យដើម..." />
        </div>
      </div>

      <!-- Preview -->
      <div class="preview-card">
        <pre id="preview" class="preview"></pre>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="insert-btn" class="btn-primary">បញ្ចូល (Insert)</button>
        <button id="copy-btn" class="btn-secondary">Copy</button>
        <button id="read-selection-btn" class="btn-secondary">អានពី Cell</button>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="../lib/momentkh.js"></script>
    <script src="taskpane.js"></script>
  </body>
</html>
